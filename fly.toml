# fly.toml app configuration file generated for enlightened-fellows-discord-bot on 2025-08-26T20:10:18+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'enlightened-fellows-discord-bot'
primary_region = 'sin'

[experimental]

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'
  release_command = 'pnpm db:migrate'

[env]
  NODE_ENV = 'production'
  TZ = 'Asia/Singapore'
  WEB_PORT = '3000'

[processes]
  app = 'node dist/index.js'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
